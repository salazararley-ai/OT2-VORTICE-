<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OT — Vórtice E&C SAS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
html{font-size:32px;}
:root{--navy:#0f2138;--cyan:#00b8d9;--light:#f0f7fa;--border:#cce0ea;--text:#0a1520;--muted:#2b4858;--green:#00c878;--r:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--light);font-family:'Barlow',sans-serif;color:var(--text);font-size:1rem;-webkit-text-size-adjust:100%;}
.hdr{background:var(--navy);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:700;color:#fff;letter-spacing:1px;}
.hdr-brand span{color:var(--cyan);}
.hdr-sub{font-size:0.5rem;color:var(--muted);}
.hdr-ot-lbl{font-size:0.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:right;}
.hdr-ot-num{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--cyan);}
.progress-bar{background:#1a3352;height:3px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#0097b2,var(--cyan));transition:width .3s;width:0%;}
.main{max-width:600px;margin:0 auto;padding:6px 8px 76px;}
.card{background:#fff;border-radius:var(--r);margin-bottom:6px;overflow:hidden;box-shadow:0 1px 4px rgba(15,33,56,.07);}
.card-head{background:var(--navy);padding:7px 12px;display:flex;align-items:center;gap:8px;}
.card-head-icon{font-size:0.7rem;}
.card-head-title{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.card-body{padding:8px;display:flex;flex-direction:column;gap:6px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;}
.f{display:flex;flex-direction:column;gap:2px;}
.f label{font-size:0.55rem !important;font-weight:700 !important;color:#000000 !important;text-transform:uppercase;letter-spacing:.6px;}
.f input,.f select,.f textarea{background:var(--light);border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'Barlow',sans-serif;font-size:0.85rem !important;color:var(--text) !important;width:100%;-webkit-appearance:none;transition:border-color .15s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--cyan);background:#fff;}
.f textarea{resize:vertical;min-height:54px;line-height:1.4;}
.trab{display:flex;gap:8px;align-items:center;}
.trab-n{width:26px;height:26px;background:var(--navy);color:var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;flex-shrink:0;}
.trab input{flex:1;background:var(--light);border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'Barlow',sans-serif;font-size:0.85rem !important;color:var(--text) !important;}
.trab input:focus{outline:none;border-color:var(--cyan);background:#fff;}
.mat-hdr{display:grid;grid-template-columns:1fr 52px 72px 72px;gap:4px;padding:6px 8px;background:#1a3352;border-radius:4px 4px 0 0;}
.mat-hdr span{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;color:var(--cyan);font-weight:600;text-align:right;}
.mat-hdr span:first-child{text-align:left;}
.mat-row{display:grid;grid-template-columns:1fr 52px 72px 72px;gap:4px;padding:4px 0;border-bottom:1px solid var(--border);}
.mat-row input{background:var(--light);border:1.5px solid var(--border);border-radius:5px;padding:7px 6px;font-size:0.75rem !important;font-family:'Barlow',sans-serif;color:var(--text) !important;width:100%;text-align:right;}
.mat-row input:first-child{text-align:left;}
.mat-row input:focus{outline:none;border-color:var(--cyan);background:#fff;}
.mat-row input[readonly]{background:#f0f7fa;color:var(--muted) !important;}
.mat-mano{display:grid;grid-template-columns:1fr 200px;gap:4px;padding:4px 0;}
.mat-mano-lbl{font-size:0.65rem;color:var(--muted);text-align:right;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
.mat-mano input{background:#fff;border:1.5px solid var(--border);border-radius:5px;padding:7px 8px;font-size:0.75rem !important;font-family:'Barlow',sans-serif;text-align:right;width:100%;}
.mat-total{background:var(--navy);border-radius:0 0 4px 4px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;}
.mat-total-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;color:#fff;font-weight:600;}
.mat-total-val{font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:var(--cyan);font-weight:700;}
.foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.foto-item label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:2px dashed var(--border);border-radius:var(--r);padding:8px;cursor:pointer;transition:all .2s;min-height:68px;position:relative;}
.foto-item label.taken{border-color:var(--green);background:rgba(0,200,120,.05);}
.foto-item input[type=file]{display:none;}
.foto-item-lbl{font-size:0.55rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.foto-item label.taken .foto-item-lbl{color:var(--green);}
.foto-preview{width:100%;border-radius:6px;max-height:130px;object-fit:cover;margin-top:6px;display:none;}
.foto-check-badge{position:absolute;top:6px;right:6px;background:var(--green);color:#fff;border-radius:50%;width:18px;height:18px;font-size:0.5rem;display:none;align-items:center;justify-content:center;}
.foto-item label.taken .foto-check-badge{display:flex;}
.pago-row{display:flex;gap:8px;}
.pago-opt{flex:1;border:2px solid var(--border);border-radius:var(--r);padding:6px 4px;text-align:center;cursor:pointer;font-size:0.65rem;font-weight:600;color:var(--muted);transition:all .2s;}
.pago-opt.sel{border-color:var(--cyan);background:rgba(0,184,217,.08);color:var(--cyan);}
.pago-opt span{display:block;font-size:1rem;margin-bottom:2px;}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:7px 12px;display:flex;gap:8px;box-shadow:0 -3px 12px rgba(0,0,0,.07);}
.btn-clear{border:2px solid var(--border);background:none;border-radius:8px;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:600;color:var(--muted);cursor:pointer;}
.btn-pdf{flex:1;background:var(--navy);border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:1px;color:#fff;cursor:pointer;}

/* ===== PDF PRINT STYLES ===== */
@page{size:letter portrait;margin:10mm 15mm;}

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body, html { margin: 0; padding: 0; background: white; font-size: 11pt !important; }
  .hdr, .progress-bar, .bottom, .card { display: none !important; }
  #pdf-output { display: block !important; width: 100% !important; }
}

#pdf-output {
  display: none;
  font-family: 'Barlow', sans-serif;
  font-size: 11pt;
  color: #0a1520;
  width: 216mm;
  margin: 0 auto;
}

@media screen and (max-width: 700px) {
  #pdf-output {
    width: 100% !important;
    overflow-x: hidden;
  }
  #pdf-output .p-g4 { grid-template-columns: 1fr 1fr !important; }
  #pdf-output .p-g3 { grid-template-columns: 1fr 1fr !important; }
  #pdf-output .p-hdr { flex-direction: column; gap: 8px; align-items: flex-start; }
  #pdf-output .p-brand-name { font-size: 22pt !important; }
  #pdf-output .p-ot-box { align-self: flex-start; }
  #pdf-output .p-firma-row { grid-template-columns: 1fr !important; gap: 16px; }
  #pdf-output .p-foto-grid { grid-template-columns: 1fr !important; }
}

/* PDF Header */
.p-hdr { background: #0f2138; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.p-brand-name { font-family: 'Barlow Condensed', sans-serif; font-size: 36pt; font-weight: 700; color: #fff; letter-spacing: 1px; line-height: 1; }
.p-brand-name span { color: #00b8d9; }
.p-brand-sub { font-size: 9pt; color: #6b8fa3; margin-top: 3px; }
.p-brand-contact { font-size: 8.5pt; color: #4a8aa0; margin-top: 2px; }
.p-ot-box { background: #00b8d9; border-radius: 6px; padding: 8px 16px; text-align: center; min-width: 80px; }
.p-ot-lbl { font-size: 8pt; color: #0f2138; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.p-ot-num { font-family: 'Barlow Condensed', sans-serif; font-size: 38pt; font-weight: 700; color: #0f2138; line-height: 1; }
.p-stripe { background: #00b8d9; height: 4px; }
.p-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.p-sec { border: 1.5px solid #cce0ea; border-radius: 5px; overflow: hidden; }
.p-sec-hdr { background: #0f2138; padding: 6px 10px; }
.p-sec-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13pt; font-weight: 600; color: #00b8d9; text-transform: uppercase; letter-spacing: .5px; }
.p-sec-body { padding: 8px 10px; }
.p-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.p-g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.p-g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.p-f { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
.p-lbl { font-size: 9pt; font-weight: 700; color: #2b4858; text-transform: uppercase; letter-spacing: .6px; }
.p-val { font-size: 12.5pt; font-weight: 500; color: #0a1520; border-bottom: 1.5px solid #d0e8f0; padding-bottom: 3px; min-height: 18px; }
.p-trab { display: flex; gap: 8px; align-items: center; padding: 5px 0; border-bottom: 1px solid #eef5f8; }
.p-trab-n { width: 22px; height: 22px; background: #0f2138; color: #00b8d9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 11pt; font-weight: 700; flex-shrink: 0; }
.p-trab-v { font-size: 12.5pt; color: #0a1520; }
.p-tbl { width: 100%; border-collapse: collapse; }
.p-tbl thead tr { background: #1a3352; }
.p-tbl thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 10pt; color: #00b8d9; padding: 6px 8px; font-weight: 600; text-align: right; }
.p-tbl thead th:first-child { text-align: left; }
.p-tbl tbody tr:nth-child(even) { background: #f5fbfd; }
.p-tbl tbody td { font-size: 11pt; padding: 5px 8px; border-bottom: 1px solid #e8f2f6; text-align: right; color: #0a1520; }
.p-tbl tbody td:first-child { text-align: left; }
.p-tbl .p-sub td { background: #eef7fa; font-size: 10pt; color: #2b4858; padding: 4px 8px; }
.p-tbl .p-tot td { background: #0f2138; font-family: 'Barlow Condensed', sans-serif; font-size: 15pt; font-weight: 700; padding: 8px 10px; color: #fff; }
.p-tbl .p-tot td:last-child { color: #00b8d9; font-size: 17pt; }
.p-foto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.p-foto-box { border: 1.5px solid #cce0ea; border-radius: 5px; overflow: hidden; }
.p-foto-lbl { background: #eef7fa; padding: 5px 10px; font-size: 9pt; font-weight: 700; color: #2b4858; text-transform: uppercase; }
.p-foto-area { height: 50mm; background: #f8fcfe; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.p-foto-area img { width: 100%; height: 100%; object-fit: cover; }
.p-foto-empty { color: #aac8d4; text-align: center; font-size: 9pt; }
.p-pago-badge { display: inline-block; background: rgba(0,184,217,0.1); border: 1.5px solid #00b8d9; border-radius: 4px; padding: 3px 12px; font-size: 11pt; font-weight: 600; color: #0097b2; }
.p-firma-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 10px; }
.p-firma-line { border-top: 1.5px solid #aac8d4; padding-top: 5px; font-size: 8.5pt; color: #2b4858; text-align: center; margin-top: 22px; }
.p-footer { background: #0f2138; padding: 6px 18px; display: flex; justify-content: space-between; margin-top: auto; }
.p-footer-txt { font-size: 8pt; color: #3d6a7a; }
</style>
</head>
<body>

<!-- FORMULARIO -->
<div class="hdr">
  <div>
    <div class="hdr-brand">VÓRTICE <span>E&amp;C SAS</span></div>
    <div class="hdr-sub">Refrigeración · Maquinaria Industrial · 311 667 6799</div>
  </div>
  <div>
    <div class="hdr-ot-lbl">Orden No.</div>
    <div class="hdr-ot-num" id="otDisplay">001</div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>

<div class="main">
  <div class="card">
    <div class="card-head"><span class="card-head-icon">📋</span><span class="card-head-title">General y Cliente</span></div>
    <div class="card-body">
      <div class="g4">
        <div class="f"><label>No. Orden</label><input id="otNum" value="001" oninput="document.getElementById('otDisplay').textContent=this.value||'001';prog()"></div>
        <div class="f"><label>Fecha</label><input type="date" id="fecha" oninput="prog()"></div>
        <div class="f"><label>Inicio</label><input type="time" id="horaInicio"></div>
        <div class="f"><label>Fin</label><input type="time" id="horaFin"></div>
      </div>
      <div class="g2">
        <div class="f"><label>Técnico</label><input id="tecnico" placeholder="Nombre" oninput="prog()"></div>
        <div class="f"><label>Cliente / Empresa</label><input id="cliente" placeholder="Nombre o razón social" oninput="prog()"></div>
      </div>
      <div class="g2">
        <div class="f"><label>Teléfono</label><input type="tel" id="telefono" placeholder="Cel / fijo"></div>
        <div class="f"><label>Dirección</label><input id="direccion" placeholder="Dirección del servicio" oninput="prog()"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-head-icon">❄️</span><span class="card-head-title">Equipo</span></div>
    <div class="card-body">
      <div class="g2">
        <div class="f"><label>Tipo de equipo</label>
          <select id="tipoEquipo" oninput="prog()">
            <option value="">Seleccionar...</option>
            <optgroup label="Refrigeración">
              <option>Cuarto frío</option><option>Refrigerador comercial</option>
              <option>Nevera de postres / vitrina</option><option>Congelador vertical</option>
              <option>Congelador horizontal</option><option>Chiller industrial</option>
              <option>Unidad condensadora</option><option>Compresor industrial</option>
            </optgroup>
            <optgroup label="Panadería y cocina">
              <option>Horno industrial</option><option>Horno de convección</option>
              <option>Horno de piso / panadero</option><option>Freidora industrial</option>
              <option>Plancha industrial</option><option>Batidora industrial</option>
              <option>Amasadora</option><option>Cámara de fermentación</option>
              <option>Estufa industrial</option>
            </optgroup>
            <optgroup label="Climatización">
              <option>Minisplit</option><option>Aire central</option>
              <option>Extractor / ventilador</option><option>Torre de enfriamiento</option>
            </optgroup>
            <optgroup label="Otro"><option>Otro equipo</option></optgroup>
          </select>
        </div>
        <div class="f"><label>Marca / Modelo</label><input id="marcaModelo" placeholder="Ej: Tecumseh TH4"></div>
      </div>
      <div class="g2">
        <div class="f"><label>Serial (opcional)</label><input id="serial" placeholder="S/N"></div>
        <div class="f"><label>Ubicación</label><input id="ubicacion" placeholder="Ej: Cuarto trasero"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-head-icon">🔧</span><span class="card-head-title">Diagnóstico y Trabajos</span></div>
    <div class="card-body">
      <div class="f"><label>Falla / motivo del servicio</label>
        <textarea id="diagnostico" placeholder="Describe la falla o motivo..." oninput="prog()"></textarea>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div class="trab"><div class="trab-n">1</div><input id="t1" placeholder="Trabajo realizado..." oninput="prog()"></div>
        <div class="trab"><div class="trab-n">2</div><input id="t2" placeholder="Trabajo realizado..."></div>
        <div class="trab"><div class="trab-n">3</div><input id="t3" placeholder="Trabajo realizado..."></div>
        <div class="trab"><div class="trab-n">4</div><input id="t4" placeholder="Opcional..."></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-head-icon">🧰</span><span class="card-head-title">Materiales y Cobro</span></div>
    <div class="card-body">
      <div>
        <div class="mat-hdr"><span>Descripción</span><span>Cant.</span><span>V.Unit $</span><span>Total $</span></div>
        <div id="matBody">
          <div class="mat-row"><input placeholder="Material o repuesto"><input type="number" placeholder="1" min="0" oninput="calcMat()" style="text-align:right"><input type="number" placeholder="0" min="0" oninput="calcMat()" style="text-align:right"><input type="number" readonly style="text-align:right"></div>
          <div class="mat-row"><input placeholder="Material o repuesto"><input type="number" placeholder="1" min="0" oninput="calcMat()" style="text-align:right"><input type="number" placeholder="0" min="0" oninput="calcMat()" style="text-align:right"><input type="number" readonly style="text-align:right"></div>
          <div class="mat-row"><input placeholder="Material o repuesto"><input type="number" placeholder="1" min="0" oninput="calcMat()" style="text-align:right"><input type="number" placeholder="0" min="0" oninput="calcMat()" style="text-align:right"><input type="number" readonly style="text-align:right"></div>
        </div>
        <div class="mat-mano">
          <div class="mat-mano-lbl">Mano de obra:</div>
          <input type="number" id="manoObra" placeholder="0" min="0" oninput="calcMat()" style="text-align:right">
        </div>
        <div class="mat-total">
          <span class="mat-total-lbl">TOTAL A COBRAR</span>
          <span class="mat-total-val" id="totalFinal">$ 0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-head-icon">📷</span><span class="card-head-title">Fotos y Cierre</span></div>
    <div class="card-body">
      <div class="foto-grid">
        <div class="foto-item">
          <label id="lblBefore">
            <div class="foto-check-badge">✓</div>
            <input type="file" accept="image/*" id="inBefore" onchange="previewFoto(this,'prevBefore','lblBefore')">
            <span style="font-size:1.2rem">📸</span>
            <span class="foto-item-lbl">Foto ANTES</span>
            <img id="prevBefore" class="foto-preview">
          </label>
        </div>
        <div class="foto-item">
          <label id="lblAfter">
            <div class="foto-check-badge">✓</div>
            <input type="file" accept="image/*" id="inAfter" onchange="previewFoto(this,'prevAfter','lblAfter')">
            <span style="font-size:1.2rem">📸</span>
            <span class="foto-item-lbl">Foto DESPUÉS</span>
            <img id="prevAfter" class="foto-preview">
          </label>
        </div>
      </div>
      <div>
        <label style="font-size:0.55rem;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px">Forma de Pago</label>
        <div class="pago-row">
          <div class="pago-opt sel" id="pEfectivo" onclick="selPago('Efectivo')"><span>💵</span>Efectivo</div>
          <div class="pago-opt" id="pTransferencia" onclick="selPago('Transferencia')"><span>📱</span>Transf.</div>
          <div class="pago-opt" id="pCredito" onclick="selPago('Credito')"><span>📄</span>Crédito</div>
        </div>
      </div>
      <div class="g2">
        <div class="f"><label>Garantía</label>
          <select id="garantia">
            <option>30 días mano de obra</option><option>60 días mano de obra</option>
            <option>90 días mano de obra</option><option>Sin garantía</option>
          </select>
        </div>
        <div class="f"><label>Próximo servicio</label><input id="proximoServicio" placeholder="Ej: 3 meses"></div>
      </div>
      <div class="f"><label>Observaciones</label>
        <textarea id="observaciones" placeholder="Recomendaciones al cliente..."></textarea>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <button class="btn-clear" onclick="clearForm()">🗑</button>
  <button class="btn-pdf" onclick="generarPDF()">⬇ Guardar PDF</button>
</div>

<!-- PDF OUTPUT (oculto, solo para impresión) -->
<div id="pdf-output"></div>

<script>
document.getElementById('fecha').valueAsDate = new Date();
let pagoSel = 'Efectivo';

function selPago(p) {
  pagoSel = p;
  ['Efectivo','Transferencia','Credito'].forEach(t => document.getElementById('p'+t).classList.remove('sel'));
  document.getElementById('p'+p).classList.add('sel');
}

function previewFoto(input, previewId, labelId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById(labelId).classList.add('taken');
  };
  reader.readAsDataURL(file);
}

function calcMat() {
  const rows = document.querySelectorAll('#matBody .mat-row');
  let sub = 0;
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const c = parseFloat(inputs[1].value)||0, u = parseFloat(inputs[2].value)||0, t = c*u;
    inputs[3].value = t > 0 ? t : '';
    sub += t;
  });
  const mano = parseFloat(document.getElementById('manoObra').value)||0;
  document.getElementById('totalFinal').textContent = '$ ' + (sub+mano).toLocaleString('es-CO');
}

function prog() {
  const ids = ['otNum','fecha','tecnico','cliente','direccion','tipoEquipo','diagnostico','t1'];
  const filled = ids.filter(id => document.getElementById(id).value.trim()).length;
  document.getElementById('pFill').style.width = Math.round(filled/ids.length*100)+'%';
}

function fmtCOP(v) { return '$ ' + (parseFloat(v)||0).toLocaleString('es-CO'); }

function fotoSrc(id) {
  const img = document.getElementById(id);
  return (img && img.src && img.style.display !== 'none') ? img.src : null;
}

function clearForm() {
  if (!confirm('¿Limpiar todo?')) return;
  document.querySelectorAll('input:not([readonly]),textarea,select').forEach(el => {
    if (el.type==='date') el.valueAsDate=new Date();
    else if (el.tagName==='SELECT') el.selectedIndex=0;
    else el.value='';
  });
  ['prevBefore','prevAfter'].forEach(id => { const img=document.getElementById(id); img.src=''; img.style.display='none'; });
  ['lblBefore','lblAfter'].forEach(id => document.getElementById(id).classList.remove('taken'));
  selPago('Efectivo');

  document.getElementById('otDisplay').textContent='001';

}
